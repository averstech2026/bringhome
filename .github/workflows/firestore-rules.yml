name: Firestore rules tests

on:
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vitest.config.js'
      - 'firebase.json'
      - '.github/workflows/firestore-rules.yml'
  pull_request:
    paths:
      - 'firestore.rules'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vitest.config.js'
      - 'firebase.json'
      - '.github/workflows/firestore-rules.yml'

jobs:
  rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: npm ci
      - run: npm run test
