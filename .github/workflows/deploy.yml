name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Do not cancel in-progress deploys — avoids "Deployment failed, try again later"
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Bump patch version
        if: >-
          github.event_name == 'workflow_dispatch' ||
          (github.event.head_commit != null &&
           !startsWith(github.event.head_commit.message, 'chore: bump version'))
        run: node scripts/bump-patch-version.mjs

      - name: Build
        run: npm run build:pages
        env:
          GITHUB_PAGES: true
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          # Push-уведомления (FCM): VAPID для подписки + URL прокси отправки
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
          VITE_YANDEX_PUSH_URL: ${{ secrets.VITE_YANDEX_PUSH_URL }}
          # Yandex Cloud Functions (https://functions.yandexcloud.net/<function-id>)
          VITE_YANDEX_PARSE_URL: ${{ secrets.VITE_YANDEX_PARSE_URL }}

      - name: Commit version bump
        if: >-
          github.event_name == 'workflow_dispatch' ||
          (github.event.head_commit != null &&
           !startsWith(github.event.head_commit.message, 'chore: bump version'))
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git diff --staged --quiet && exit 0
          git commit -m "chore: bump version to $(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).version")"
          git push

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000
